<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="crispEdges">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#04040c"/>
    </radialGradient>
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGlow)" rx="0"/>

  <!-- Grid lines - subtle cyberspace floor -->
  <g opacity="0.12" stroke="#00d4ff" stroke-width="1" fill="none">
    <!-- Horizontal grid -->
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <!-- Vertical grid -->
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Outer hexagon border -->
  <polygon
    points="256,40 452,152 452,360 256,472 60,360 60,152"
    fill="none"
    stroke="#8b0000"
    stroke-width="6"
    opacity="0.5"
  />

  <!-- Inner hexagon -->
  <polygon
    points="256,76 420,168 420,344 256,436 92,344 92,168"
    fill="none"
    stroke="#c8001e"
    stroke-width="3"
    opacity="0.25"
  />

  <!-- Torii gate - main pillars -->
  <!-- Left pillar -->
  <rect x="148" y="210" width="44" height="188" fill="#c8001e" filter="url(#redGlow)" opacity="0.95"/>
  <!-- Right pillar -->
  <rect x="320" y="210" width="44" height="188" fill="#c8001e" filter="url(#redGlow)" opacity="0.95"/>

  <!-- Torii gate - top kasagi (curved top beam - rendered as trapezoid) -->
  <polygon points="108,186 404,186 416,158 96,158" fill="#c8001e" filter="url(#redGlow)" opacity="0.95"/>

  <!-- Torii gate - second beam (nuki) -->
  <rect x="148" y="220" width="216" height="30" fill="#c8001e" opacity="0.85"/>

  <!-- Torii gate - top cap rectangle -->
  <rect x="120" y="144" width="272" height="20" fill="#e0001e" opacity="0.7"/>

  <!-- Ground line - cyan glow suggesting the Net -->
  <rect x="60" y="398" width="392" height="4" fill="#00d4ff" filter="url(#cyanGlow)" opacity="0.85"/>

  <!-- Scanline effect strip on ground -->
  <rect x="60" y="402" width="392" height="2" fill="#00d4ff" opacity="0.25"/>

  <!-- Corner data brackets - top left -->
  <polyline points="60,80 60,60 80,60" fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.6"/>
  <!-- top right -->
  <polyline points="452,80 452,60 432,60" fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.6"/>
  <!-- bottom left -->
  <polyline points="60,432 60,452 80,452" fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.6"/>
  <!-- bottom right -->
  <polyline points="452,432 452,452 432,452" fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.6"/>

  <!-- Small data dots at gate base corners -->
  <rect x="140" y="390" width="8" height="8" fill="#00d4ff" opacity="0.8"/>
  <rect x="364" y="390" width="8" height="8" fill="#00d4ff" opacity="0.8"/>

  <!-- Central vertical data stream inside gate -->
  <rect x="251" y="250" width="10" height="140" fill="#00d4ff" opacity="0.15"/>
  <rect x="251" y="290" width="10" height="8" fill="#00d4ff" opacity="0.6"/>
  <rect x="251" y="320" width="10" height="4" fill="#00d4ff" opacity="0.5"/>
  <rect x="251" y="340" width="10" height="6" fill="#00d4ff" opacity="0.4"/>
  <rect x="251" y="360" width="10" height="3" fill="#00d4ff" opacity="0.3"/>

  <!-- Mikoshi label - small monospace text at bottom -->
  <text
    x="256" y="490"
    font-family="'Courier New', Courier, monospace"
    font-size="22"
    font-weight="700"
    fill="#c8001e"
    text-anchor="middle"
    letter-spacing="6"
    opacity="0.7"
  >MIKOSHI</text>
</svg>
